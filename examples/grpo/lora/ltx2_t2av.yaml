# Environment Configuration
launcher: "accelerate"
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  dataset_dir: "dataset/ltx2_t2av"  # Path to dataset folder (video_dir + audio_dir + metadata.jsonl)
  audio_dir: "dataset/ltx2_t2av/audios"  # Audio files directory
  preprocessing_batch_size: 4
  dataloader_num_workers: 8
  force_reprocess: true
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 1000
  sampler_type: "auto"

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 16
  lora_alpha: 16
  target_components: ['transformer']
  target_modules: "default"  # 28 Linear layers per block (video/audio attn + cross-modal attn + FFN)
  model_name_or_path: "Lightricks/LTX-2"
  model_type: "ltx2_t2av"
  resume_path: null
  resume_type: null

log:
  run_name: null
  project: "Flow-Factory"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 20
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'grpo'
  advantage_aggregation: 'gdpo'
  # Clipping
  clip_range: 1.0e-4
  adv_clip_range: 5.0
  # KL div
  kl_type: 'v-based'
  kl_beta: 0
  ref_param_device: 'cuda'

  # Video settings (LTX2: 768x512, 121 frames at 24fps = ~5s)
  resolution: [768, 512]
  num_frames: 121  # (num_frames - 1) % 8 == 0
  frame_rate: 24.0
  num_inference_steps: 40
  guidance_scale: 4.0

  # Batch and sampling
  per_device_batch_size: 1
  group_size: 4
  global_std: false
  unique_sample_num_per_epoch: 16
  gradient_step_per_epoch: 2
  gradient_accumulation_steps: auto

  # Optimization
  seed: 42
  learning_rate: 1.0e-5
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # EMA
  ema_decay: 0.9
  ema_update_interval: 4
  ema_device: "cuda"

  # Gradient checkpointing
  enable_gradient_checkpointing: false

# Scheduler Configuration
scheduler:
  dynamics_type: "Flow-SDE"
  noise_level: 0.9
  num_sde_steps: 1
  sde_steps: [1, 2, 3]
  seed: 42

# Evaluation settings
eval:
  resolution: [768, 512]
  num_frames: 121
  frame_rate: 24.0
  per_device_batch_size: 1
  guidance_scale: 4.0
  num_inference_steps: 40
  eval_freq: 20
  seed: 42

# Reward Model Configuration
rewards:
  - name: "video_quality"
    reward_model: "PickScore"
    weight: 1
    batch_size: 4
    device: "cuda"
    dtype: bfloat16
