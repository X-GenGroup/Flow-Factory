launcher: "accelerate"
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

run_name: null
project: "Flow-Factory"
logging_backend: "none"

data:
  dataset_dir: "dataset/pickscore"
  preprocessing_batch_size: 32
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 1024

model:
  finetune_type: "lora"
  lora_rank: 32
  lora_alpha: 64
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"
  resume_path: null
  resume_type: null

log:
  save_dir: "./outputs/dmdr_sd35"
  save_freq: 0
  save_model_only: true
  verbose: true

train:
  trainer_type: "dmdr"
  resolution: 512
  per_device_batch_size: 4
  group_size: 8
  unique_sample_num_per_epoch: 32
  gradient_step_per_epoch: 2

  learning_rate: 1.0e-5
  learning_rate_gui: 1.0e-5
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  dmdr_num_steps: 4
  dmdr_shift: 1.0
  ratio_update: 5
  cold_start_iter: 20

  gen_a: 1.0
  gen_b: 1.0
  gui_a: 4.0
  gui_b: 1.5
  s_type_gen: "logit_normal"
  s_type_gui: "logit_normal"
  dynamic_step: 0

  lora_scale_f: 1.0
  lora_scale_r: 0.25
  guidance_scale: 1.0

  encoder_type: null
  dino_loss_weight: 0.5

  ema_decay: 0.99
  ema_update_interval: 4
  ema_device: "cuda"
  enable_gradient_checkpointing: false
  seed: 42

scheduler:
  dynamics_type: "ODE"

eval:
  resolution: 512
  per_device_batch_size: 4
  guidance_scale: 4.5
  num_inference_steps: 28
  eval_freq: 0
  seed: 42

rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 16
    device: "cuda"
    dtype: bfloat16
