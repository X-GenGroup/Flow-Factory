# Environment Configuration
launcher: "accelerate"  # Options: accelerate
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8  # Number of processes to launch (overrides config file)
main_process_port: 29500
mixed_precision: "bf16"  # Options: no, fp16, bf16

# Data Configuration
data:
  dataset_dir: "dataset/pickscore"  # Path to dataset folder
  preprocessing_batch_size: 8  # Batch size for preprocessing
  dataloader_num_workers: 16  # Number of workers for DataLoader
  force_reprocess: false  # Force reprocessing of the dataset
  cache_dir: "~/.cache/flow_factory/datasets" # Cache directory for preprocessed datasets
  max_dataset_size: 1024  # Limit the maximum number of samples in the dataset
  sampler_type: "group_contiguous"  # "distributed_k_repeat" also works but with extra all-gather communication; use if your GPU resources are limited

# Model Configuration
model:
  finetune_type: 'lora' # Options: full, lora
  lora_rank : 64
  lora_alpha : 128
  target_modules: "default" # Options: all, default, or list of module names
  model_name_or_path: "black-forest-labs/FLUX.1-dev"  # HuggingFace model ID or local path
  model_type: "flux1"
  resume_path: null # Path to load previous checkpoint/lora adapter
  resume_type: null # Options: lora, full, state. Null to auto-detect based on `finetune_type`

log:
  run_name: null  # Run name (auto: {model_type}_{finetune_type}_{trainer_type}_{timestamp})
  project: "Flow-Factory"  # Project name for logging
  logging_backend: "wandb"  # Options: wandb, swanlab, none
  save_dir: "saves/"  # Directory to save model checkpoints and logs
  save_freq: 20  # Save frequency in epochs (0 to disable)
  save_model_only: true  # Save only the model weights (not optimizer, scheduler, etc.)

# Training Configuration
train:
  # Trainer settings
  trainer_type: 'dpo'

  # DPO-specific parameters
  beta: 2000.0  # DPO temperature — controls preference sharpness
  weighting_scheme: 'logit_normal'  # Timestep sampling distribution
  logit_mean: 0.0
  logit_std: 1.0

  # Timestep control
  num_train_timesteps: 0  # 0 = auto (num_inference_steps × timestep_range). Options: any positive integer
  timestep_range: 1.0     # Timestep range for training. Options: float for [0, value] or [start, end]

  # Reference model
  ref_param_device: 'cuda' # Options: cpu, cuda

  # Advantage / pair formation
  global_std: true  # Whether to use global std for advantage normalization
  advantage_aggregation: 'gdpo'  # Options: sum, gdpo

  # Sampling
  resolution: 512  # Can be int or [height, width]
  num_inference_steps: 28  # Number of timesteps for generation
  guidance_scale: 3.5  # Guidance scale for sampling

  # Batch and sampling
  per_device_batch_size: 2  # Batch size per device
  group_size: 4  # Generate 4 samples per prompt, pick best/worst as pair
  global_std: false
  unique_sample_num_per_epoch: 32  # Unique samples per epoch
  gradient_step_per_epoch: 2  # Gradient steps per epoch

  # EMA
  ema_decay: 0.995  # EMA decay rate (0 to disable)
  ema_update_interval: 10  # EMA update interval (in epochs)
  ema_device: "cuda"  # Device to store EMA model

  # Optimization
  learning_rate: 1.0e-6  # Initial learning rate (lower for DPO)
  adam_weight_decay: 1.0e-4  # AdamW weight decay
  adam_betas: [0.9, 0.999]  # AdamW betas
  adam_epsilon: 1.0e-8  # AdamW epsilon
  max_grad_norm: 1.0  # Max gradient norm for clipping

  # Gradient checkpointing
  enable_gradient_checkpointing: false

  # Seed
  seed: 42  # Random seed

# Scheduler Configuration
scheduler:
  dynamics_type: "ODE"  # DPO is compatible with ODE (no SDE needed)

# Evaluation settings
eval:
  resolution: 1024  # Evaluation resolution
  per_device_batch_size: 1  # Eval batch size
  guidance_scale: 3.5  # Guidance scale for sampling
  num_inference_steps: 28  # Number of eval timesteps
  eval_freq: 20  # Eval frequency in epochs (0 to disable)
  seed: 42  # Eval seed

# Reward Model Configuration
rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 16
    device: "cuda"
    dtype: bfloat16

# Optional Evaluation Reward Models
eval_rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    batch_size: 32
    device: "cuda"
    dtype: bfloat16
