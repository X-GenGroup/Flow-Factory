# Debug config: GroupContiguousSampler (all K copies on same rank)
# Pair with debug_example/dist.yaml for A/B comparison of sampler strategies.
# The ONLY difference is data.sampler_type.
#
# Expected: Both configs should produce identical reward/advantage statistics
# (up to floating-point order-of-operations differences) since the underlying
# data and algorithm are the same — only the communication topology differs.
#
# What to verify:
# 1. Training completes 3 epochs without error
# 2. train/reward_*_mean, train/adv_* are close to dist.yaml values
# 3. global_std computation is correct (advantage magnitudes consistent)
# 4. No deadlocks or hangs (barrier mismatch)

# Environment Configuration
launcher: "accelerate"
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  dataset_dir: "dataset/pickscore"
  preprocessing_batch_size: 8
  dataloader_num_workers: 4
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 256  # Small dataset for fast iteration
  sampler_type: "group_contiguous"  # <-- KEY DIFFERENCE: group-contiguous sampler

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 16
  lora_alpha: 32
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"

log:
  run_name: "debug_group_sampler"
  project: "FF-Debug-Sampler"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 0  # No checkpoint saving during debug
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'nft'
  advantage_aggregation: 'sum'
  nft_beta: 1.0
  off_policy: false  # On-policy for simpler debug
  ema_decay: 0  # Disable EMA for debug
  # Training Timestep distribution
  num_train_timesteps: 2
  time_sampling_strategy: discrete
  time_shift: 3.0
  timestep_range: 0.5
  # KL
  kl_beta: 0
  ref_param_device: 'cuda'
  # Clipping
  adv_clip_range: 5.0

  # Sampling
  resolution: 256  # Low res for speed
  num_inference_steps: 8
  guidance_scale: 1.0

  # Batch and sampling — geometric constraints:
  # W=8, B=2, K=16, G=1
  # M*K = 8*16 = 128, W*B*G = 8*2*1 = 16, 128 % 16 = 0 ✓ (base)
  # M % W = 8 % 8 = 0 ✓ (group_contiguous extra constraint)
  # (M/W)*K = 1*16 = 16, 16 % B = 16 % 2 = 0 ✓
  per_device_batch_size: 2
  group_size: 16
  global_std: true  # Test global_std path (the bug we fixed)
  unique_sample_num_per_epoch: 8
  gradient_step_per_epoch: 1
  num_inner_epochs: 1
  max_epochs: 3  # Just 3 epochs for smoke test

  # Optimization
  learning_rate: 1.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  enable_gradient_checkpointing: false
  seed: 42

# Scheduler Configuration
scheduler:
  dynamics_type: "ODE"

# Evaluation — disabled for speed
eval:
  eval_freq: 0

# Reward Model Configuration
rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: bfloat16
