# Debug config: GroupContiguousSampler + Groupwise reward (PickScore_Rank)
# Pair with debug_example/dist_groupwise.yaml for A/B comparison.
# Differences vs group.yaml: adds PickScore_Rank as groupwise reward alongside PickScore.
#
# What to verify:
# 1. Groupwise reward (PickScore_Rank) is computed locally without cross-rank communication
# 2. Multi-reward advantage aggregation (pointwise + groupwise) works
# 3. Compare advantage statistics with dist_groupwise.yaml — should be close
# 4. Compare advantage_compute_ms with dist_groupwise.yaml — should be faster (no gather)

# Environment Configuration
launcher: "accelerate"
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  dataset_dir: "dataset/pickscore"
  preprocessing_batch_size: 8
  dataloader_num_workers: 4
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 256
  sampler_type: "group_contiguous"  # <-- all K copies on same rank

# Model Configuration
model:
  finetune_type: 'lora'
  lora_rank: 16
  lora_alpha: 32
  target_modules: "default"
  model_name_or_path: "stabilityai/stable-diffusion-3.5-medium"
  model_type: "sd3-5"

log:
  run_name: "debug_group_groupwise"
  project: "FF-Debug-Sampler"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 0
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'nft'
  advantage_aggregation: 'gdpo'  # GDPO to test multi-reward normalization
  nft_beta: 1.0
  off_policy: false
  ema_decay: 0
  num_train_timesteps: 2
  time_sampling_strategy: discrete
  time_shift: 3.0
  timestep_range: 0.5
  kl_beta: 0
  ref_param_device: 'cuda'
  adv_clip_range: 5.0
  resolution: 256
  num_inference_steps: 8
  guidance_scale: 1.0
  # W=8, B=2, K=16, G=1 — satisfies group_contiguous: M%W=8%8=0 ✓
  per_device_batch_size: 2
  group_size: 16
  global_std: true
  unique_sample_num_per_epoch: 8
  gradient_step_per_epoch: 1
  num_inner_epochs: 1
  max_epochs: 3
  learning_rate: 1.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  enable_gradient_checkpointing: false
  seed: 42

scheduler:
  dynamics_type: "ODE"

eval:
  eval_freq: 0

# Reward: Pointwise + Groupwise
rewards:
  - name: "pick_score"
    reward_model: "PickScore"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: bfloat16
  - name: "pickscore_rank"
    reward_model: "PickScore_Rank"
    weight: 1.0
    batch_size: 16
    device: "cuda"
    dtype: bfloat16
